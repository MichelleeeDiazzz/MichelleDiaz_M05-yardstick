<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michelle Diaz - Yardstick Project</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
    }

    .card {
      width: min(700px, 92vw);
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }

    h1 {
      margin: 0 0 .5rem;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
    }

    p {
      margin: .5rem 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: .45rem .75rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, .15);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, .35);
      font-weight: 600;
      font-size: .9rem;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>✅ GitHub Pages is Working</h1>
    <p>This is the starter page for <strong>MichelleDiaz_M05-yardstick</strong>.</p>
    <p>Edit <code>index.html</code> to customize your site content.</p>
    <span class="badge">Deployed with GitHub Pages</span>
  </main>
</body>
</html>
